spring:
  application:
    name: mneme
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    mcp:
      server:
        enabled: true
        name: mneme
        version: 0.1.0
        type: SYNC
        instructions: "Mneme — 사용자별 영구 메모리. 모든 도구는 mn_ prefix. 외부 ID는 base32 prefix(mem_/fld_/tag_/key_). 본문 안 [[wiki-link]]는 양방향 인덱스로 자동 반영."
        request-timeout: 30s
  messages:
    basename: i18n/errors
    encoding: UTF-8
    fallback-to-system-locale: false
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  datasource:
    url: ${MNEME_DB_URL:jdbc:postgresql://localhost:5432/mneme}
    username: ${MNEME_DB_USER:mneme}
    password: ${MNEME_DB_PASSWORD:}
    hikari:
      pool-name: mneme-hikari
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: MNEME_SESSION
        http-only: true
        secure: false   # 로컬 dev 기본. 운영(prod 프로파일)에서 true로 오버라이드
        same-site: lax
        path: /
      timeout: 168h    # 7일 (MNEME_SESSION_TTL_HOURS 기본값)

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

mneme:
  base-url: ${MNEME_BASE_URL:http://localhost:8080}
  frontend-origin: ${MNEME_FRONTEND_ORIGIN:http://localhost:5173}
  google-oauth:
    client-id: ${MNEME_GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${MNEME_GOOGLE_OAUTH_CLIENT_SECRET:}
  openai:
    api-key: ${MNEME_OPENAI_API_KEY:}
    base-url: ${MNEME_OPENAI_BASE_URL:https://api.openai.com}
    embed-model: ${MNEME_OPENAI_EMBED_MODEL:text-embedding-3-small}
    chat-model: ${MNEME_OPENAI_LLM_MODEL:gpt-4o-mini}
    request-timeout-seconds: ${MNEME_OPENAI_TIMEOUT_SEC:30}
    embedding-cache-max-size: ${MNEME_OPENAI_EMBED_CACHE_MAX:5000}
    embedding-cache-ttl-minutes: ${MNEME_OPENAI_EMBED_CACHE_TTL_MIN:30}
  search:
    vector-alpha: ${MNEME_SEARCH_VECTOR_ALPHA:0.6}
    text-beta: ${MNEME_SEARCH_TEXT_BETA:0.3}
    trigram-gamma: ${MNEME_SEARCH_TRIGRAM_GAMMA:0.1}
    default-limit: ${MNEME_SEARCH_DEFAULT_LIMIT:20}
    max-limit: ${MNEME_SEARCH_MAX_LIMIT:100}
  rate-limit:
    per-min: ${MNEME_RATE_LIMIT_PER_MIN:60}
    per-day: ${MNEME_RATE_LIMIT_PER_DAY:5000}
    write-per-min: ${MNEME_RATE_LIMIT_WRITE_PER_MIN:20}
    anonymous-per-min: ${MNEME_RATE_LIMIT_ANON_PER_MIN:30}
  token-quota:
    embed-per-day: ${MNEME_TOKEN_LIMIT_EMBED_PER_DAY:100000}
    llm-per-day: ${MNEME_TOKEN_LIMIT_LLM_PER_DAY:50000}
  oauth:
    access-ttl-minutes: ${MNEME_OAUTH_ACCESS_TOKEN_TTL_MIN:30}
    refresh-ttl-days: ${MNEME_OAUTH_REFRESH_TOKEN_TTL_DAY:30}
    code-ttl-seconds: ${MNEME_OAUTH_CODE_TTL_SEC:600}
