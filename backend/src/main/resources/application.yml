spring:
  application:
    name: mneme
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  messages:
    basename: i18n/errors
    encoding: UTF-8
    fallback-to-system-locale: false
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  datasource:
    url: ${MNEME_DB_URL:jdbc:postgresql://localhost:5432/mneme}
    username: ${MNEME_DB_USER:mneme}
    password: ${MNEME_DB_PASSWORD:}
    hikari:
      pool-name: mneme-hikari
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: MNEME_SESSION
        http-only: true
        secure: false   # 로컬 dev 기본. 운영(prod 프로파일)에서 true로 오버라이드
        same-site: lax
        path: /
      timeout: 168h    # 7일 (MNEME_SESSION_TTL_HOURS 기본값)

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

mneme:
  base-url: ${MNEME_BASE_URL:http://localhost:8080}
  frontend-origin: ${MNEME_FRONTEND_ORIGIN:http://localhost:5173}
  google-oauth:
    client-id: ${MNEME_GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${MNEME_GOOGLE_OAUTH_CLIENT_SECRET:}
