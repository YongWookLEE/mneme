spring:
  flyway:
    enabled: false   # smoke test에서는 마이그레이션 적용 안 함 (Testcontainers 통합 테스트는 별도)
  datasource:
    url: jdbc:h2:mem:smoke;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

mneme:
  base-url: http://localhost
  frontend-origin: http://localhost:5173
